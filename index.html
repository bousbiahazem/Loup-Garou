<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Werewolf Game Role Assigner</title>
    <link rel="stylesheet" href="./index.css">
    <script src="./index.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
    <link href="https://fonts.googleapis.com/css2?family=MedievalSharp&family=Uncial+Antiqua&family=Cinzel+Decorative:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>
    <div id="container">
        <div id="playerparametre">
            <h1>Werewolf Game</h1>
        <input type="text" id="inputName" placeholder="what's your name?">
        <button class="buttonAdd" onclick="Addplayer()">Add player</button>
        <button class="buttonRemove" onclick="playerRemoveButton()">v</button>
        <br><br>
        <div id="playerRemoveDiv" class="hidden"></div>
        <div id="playerList"></div>
        </div>

        <br><br><br>
        <button class="buttonParametre" onclick="parametre()">Customize Roles</button>
        <button class="buttonRolesC" onclick="assignCustomRoles()">START</button>

        <div id="RoleSelection" class="hidden">
            <div id="closeparametre" onclick="closeparametre()">X</div>
            <h2 id="rolenumber">roles</h2>
            <div id="parametre">
                <div class="paraRoles">
                    <label title="3andek l7a9 t7yi mara wto9tol mara" for="witch">Witch</label>
                    <div class="custom-number-input">
                        <button class="arrow left-arrow">◄</button>
                        <input type="number" id="witch" value="1" min="0" max="1">
                        <button class="arrow right-arrow">►</button>
                    </div>
                </div>
                <div class="paraRoles">
                    <label for="hunter">Hunter</label>
                    <div class="custom-number-input">
                        <button class="arrow left-arrow">◄</button>
                        <input type="number" id="hunter" value="1" min="0" max="1">
                        <button class="arrow right-arrow">►</button>
                    </div>
                </div>
                <div class="paraRoles">
                    <label for="mayor">Mayor</label>
                    <div class="custom-number-input">
                        <button class="arrow left-arrow">◄</button>
                        <input type="number" id="mayor" value="0" min="0" max="1">
                        <button class="arrow right-arrow">►</button>
                    </div>
                </div>
                <div class="paraRoles">
                    <label for="loveKing">Love King</label>
                    <div class="custom-number-input">
                        <button class="arrow left-arrow">◄</button>
                        <input type="number" id="loveKing" value="0" min="0" max="1">
                        <button class="arrow right-arrow">►</button>
                    </div>
                </div>
                <div class="paraRoles">
                    <label for="Seer">Seer</label>
                    <div class="custom-number-input">
                        <button class="arrow left-arrow">◄</button>
                        <input type="number" id="Seer" value="1" min="0" max="1">
                        <button class="arrow right-arrow">►</button>
                    </div>
                </div>
                <div class="paraRoles">
                    <label for="barbi">Barbi</label>
                    <div class="custom-number-input">
                        <button class="arrow left-arrow">◄</button>
                        <input type="number" id="barbi" value="0" min="0" max="1">
                        <button class="arrow right-arrow">►</button>
                    </div>
                </div>
                <div class="paraRoles">
                    <label for="healer">Healer</label>
                    <div class="custom-number-input">
                        <button class="arrow left-arrow">◄</button>
                        <input type="number" id="healer" value="1" min="0" max="1">
                        <button class="arrow right-arrow">►</button>
                    </div>
                </div>
                <div class="paraRoles">
                    <label for="werewolf">Werewolf</label>
                    <div class="custom-number-input">
                        <button class="arrow left-arrow">◄</button>
                        <input type="number" id="werewolf" value="2" min="0" max="5">
                        <button class="arrow right-arrow">►</button>
                    </div>
                </div>
                <div class="paraRoles">
                    <label for="whitewolf">White Wolf</label>
                    <div class="custom-number-input">
                        <button class="arrow left-arrow">◄</button>
                        <input type="number" id="whitewolf" value="0" min="0" max="1">
                        <button class="arrow right-arrow">►</button>
                    </div>
                </div>
                <div class="paraRoles">
                    <label for="bluewolf">Blue Wolf</label>
                    <div class="custom-number-input">
                        <button class="arrow left-arrow">◄</button>
                        <input type="number" id="bluewolf" value="0" min="0" max="1">
                        <button class="arrow right-arrow">►</button>
                    </div>
                </div>
                <div class="paraRoles">
                    <label for="InfectedWolf">Infected Wolf</label>
                    <div class="custom-number-input">
                        <button class="arrow left-arrow">◄</button>
                        <input type="number" id="InfectedWolf" value="0" min="0" max="1">
                        <button class="arrow right-arrow">►</button>
                    </div>
                </div>
                <div class="paraRoles">
                    <label for="RedWolf">Red Wolf</label>

                        <button class="arrow left-arrow">◄</button>
                        <input type="number" id="RedWolf" value="0" min="0" max="1">
                        <button class="arrow right-arrow">►</button>
                    </div>
                </div>
                <div class="paraRoles">
                    <label for="FogWolf">Fog Wolf</label>
                    <div class="custom-number-input">
                        <button class="arrow left-arrow">◄</button>
                        <input type="number" id="FogWolf" value="0" min="0" max="1">
                        <button class="arrow right-arrow">►</button>
                    </div>
                </div>
                <div class="paraRoles">
                    <label for="Bear">Bear</label>
                    <div class="custom-number-input">
                        <button class="arrow left-arrow">◄</button>
                        <input type="number" id="Bear" value="0" min="0" max="1">
                        <button class="arrow right-arrow">►</button>
                    </div>
                </div>
                <div class="paraRoles">
                    <label for="MasterBear">Master Bear</label>
                    <div class="custom-number-input">
                        <button class="arrow left-arrow">◄</button>
                        <input type="number" id="MasterBear" value="0" min="0" max="1">
                        <button class="arrow right-arrow">►</button>
                    </div>
                </div>
                <div class="paraRoles">
                    <label for="Wildchildren">Wild child</label>
                    <div class="custom-number-input">
                        <button class="arrow left-arrow">◄</button>
                        <input type="number" id="Wildchildren" value="0" min="0" max="1">
                        <button class="arrow right-arrow">►</button>
                    </div>
                </div>
                <div class="paraRoles">
                    <label for="kamikaze">kamikaze</label>
                    <div class="custom-number-input">
                        <button class="arrow left-arrow">◄</button>
                        <input type="number" id="kamikaze" value="0" min="0" max="1">
                        <button class="arrow right-arrow">►</button>
                    </div>
                </div>
                <div class="paraRoles">
                    <label for="Talkativewolf">Talkative wolf</label>
                    <div class="custom-number-input">
                        <button class="arrow left-arrow">◄</button>
                        <input type="number" id="Talkativewolf" value="0" min="0" max="1">
                        <button class="arrow right-arrow">►</button>
                    </div>
                </div>
                <div class="paraRoles">
                    <label for="judge">judge</label>
                    <div class="custom-number-input">
                        <button class="arrow left-arrow">◄</button>
                        <input type="number" id="judge" value="0" min="0" max="1">
                        <button class="arrow right-arrow">►</button>
                    </div>
                </div>
                <div class="paraRoles">
                    <label for="Thief">Thief</label>
                    <div class="custom-number-input">
                        <button class="arrow left-arrow">◄</button>
                        <input type="number" id="Thief" value="0" min="0" max="1">
                        <button class="arrow right-arrow">►</button>
                    </div>
                </div>
                <div class="paraRoles">
                    <label for="alien">Alien</label>
                    <div class="custom-number-input">
                        <button class="arrow left-arrow">◄</button>
                        <input type="number" id="alien" value="0" min="0" max="1">
                        <button class="arrow right-arrow">►</button>
                    </div>
                </div>
            </div>

            <div id="totalRolesDiv"></div>
        </div>
        <div id="card" class="hidden">
            <div id="closeCard" ondblclick="closeCard()">X</div>
            <div id="roleDisplay">Click to see the next player's role!</div>
        </div>
        <br>
        <br>
        <button class="hidden" id="resultBUtton" onclick="resultBUtton()">result</button>
        <div class="hidden" id="result"></div>
    </div>
</body>
</html>
